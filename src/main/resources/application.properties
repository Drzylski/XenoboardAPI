server.port=8080
serverBaseURL=localhost:8080/
spring.application.name=XenoboardAPI
spring.threads.virtual.enabled=true

#Logging
logging.level.root=info
logging.level.org.springframework.web=debug
logging.level.org.hibernate=info
logging.file.name=logs/log.dat
logging.file.path=logs

#Database
spring.datasource.url=jdbc:mysql://localhost:3306/xenoboard?useLegacyDatetimeCode=false&useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=zylski
spring.datasource.password=***
spring.jpa.show-sql=false
spring.data.redis.repositories.enabled=false

#hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings: true
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


